name: Verify generated CSS assets

on:
    pull_request:
    push:
        branches:
            - main

permissions:
    contents: read

jobs:
    css-assets:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: 11.7.0
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml
            - run: pnpm install --frozen-lockfile
            - run: pnpm lint:php:syntax
            - run: pnpm check
            - run: git diff --exit-code -- styles/dist/*.min.css
